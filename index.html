<!DOCTYPE html>
<html>
<body style="background:black;color:#00ff88;text-align:center;margin-top:10%;font-family:monospace;overflow:hidden;">

<div id="timer" style="font-size:140px;">10:00</div>
<div id="result" style="font-size:80px;margin-top:40px;"></div>

<audio id="alarm">
  <source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3">
</audio>

<audio id="tension">
  <source src="https://www.soundjay.com/misc/sounds/fail-buzzer-02.mp3">
</audio>

<script>
let startTime = 600;
let time = startTime;
let running = false;

let alarmPlayed = false;
let tensionPlayed = false;

let gameEnded = false;
let enteringScore = false;
let inputScore = "";
let displayScore = 0;

function update() {
  if(time < 0) time = 0;

  let m = Math.floor(time/60);
  let s = time % 60;

  document.getElementById("timer").innerText =
    m + ":" + s.toString().padStart(2,'0');

  // 🔴 laatste 10 sec
  if(time <= 10 && time > 0){

    document.body.style.background =
      (time % 2 === 0) ? "#220000" : "black";

    if(!tensionPlayed){
      document.getElementById("tension").play();
      tensionPlayed = true;
    }

  } else {
    document.body.style.background = "black";
  }

  // 🔊 alarm op 0
  if(time === 0 && !alarmPlayed){
    document.getElementById("alarm").play();
    alarmPlayed = true;
  }
}

setInterval(() => {
  if(running && time > 0){
    time--;
    update();
  }
},1000);

// 🎬 dramatische reveal
function revealScore(target){

  document.getElementById("timer").innerText = "";
  document.getElementById("result").innerText = "Jullie verdienden...";

  setTimeout(() => {

    let interval = setInterval(() => {
      displayScore++;

      document.getElementById("result").innerText =
        displayScore + " snoepjes 🍬";

      if(displayScore >= target){
        clearInterval(interval);
      }

    }, 40);

  }, 2000);
}

// 🎮 toetsen
window.addEventListener("keydown", function(e){

  // 🛑 STOP spel
  if(e.key === "Enter" && !gameEnded){
    running = false;
    gameEnded = true;
    enteringScore = true;

    document.getElementById("timer").innerText = "STOP";
    document.getElementById("result").innerText = "...";
    return;
  }

  // ⌨️ score ingeven (onzichtbaar!)
  if(enteringScore){

    if(e.key >= "0" && e.key <= "9"){
      inputScore += e.key;
    }

    if(e.key === "Backspace"){
      inputScore = inputScore.slice(0, -1);
    }

    if(e.key === "Enter"){
      enteringScore = false;
      revealScore(parseInt(inputScore || "0"));
    }

    return;
  }

  // 😈 geheime controls
  if(e.key === "a") time += 60;
  if(e.key === "z") time += 300;
  if(e.key === "f") time -= 10;
  if(e.key === "x") time -= 60;

  if(e.code === "Space"){
    running = !running;
  }
});

update();
</script>

</body>
</html>
